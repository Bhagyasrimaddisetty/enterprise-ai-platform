server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:h2:mem:authdb;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-secret}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info
