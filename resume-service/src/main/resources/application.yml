server:
  port: 8082

spring:
  application:
    name: resume-service

  datasource:
    url: ${DB_URL:jdbc:h2:mem:resumedb;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-secret}

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
